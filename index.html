<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MonoAI - Pro Edition</title>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/marked@12.0.0/marked.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/styles/atom-one-dark.min.css">
    <script src="https://unpkg.com/@highlightjs/cdn-assets@11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { 
                extend: { 
                    colors: { 
                        gray: { 
                            750: '#2f2f2f', 
                            800: '#282828',
                            850: '#212121', 
                            900: '#171717', 
                            950: '#0d0d0d' 
                        } 
                    },
                    typography: {
                        DEFAULT: { css: { color: '#e5e5e5', a: { color: '#3b82f6' }, code: { color: '#e5e5e5' } } }
                    }
                } 
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #212121; color: #ececec; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .markdown-body pre { background: #0d0d0d !important; padding: 1rem; border-radius: 0.75rem; position: relative; margin-top: 1rem; margin-bottom: 1rem; overflow-x: auto; }
        .markdown-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-body p:last-child { margin-bottom: 0; }
        
        .message-bubble { transition: background-color 0.2s ease; }
        .message-bubble:hover .msg-actions { opacity: 1; }
        
        textarea { resize: none; overflow-y: hidden; }
        textarea:focus { outline: none; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden flex text-sm">

<div id="app" class="flex w-full h-full">

    <div v-if="!isConfigured || showSettings" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm">
        <div class="bg-gray-850 w-full max-w-md rounded-2xl border border-gray-750 shadow-2xl p-6 flex flex-col gap-5 transition-all">
            <h2 class="text-xl font-semibold flex items-center gap-2">
                <i class="ph ph-gear text-2xl"></i> 系统配置
            </h2>
            
            <div class="flex flex-col gap-3">
                <div>
                    <label class="text-xs text-gray-400 mb-1 block">模型名称 (Model)</label>
                    <input v-model="tempConfig.model" class="w-full bg-gray-900 border border-gray-750 rounded-lg px-3 py-2 text-gray-200 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" placeholder="gpt-4o / claude-3-haiku">
                </div>
                <div>
                    <label class="text-xs text-gray-400 mb-1 block">API Base URL (可选)</label>
                    <input v-model="tempConfig.apiBaseUrl" class="w-full bg-gray-900 border border-gray-750 rounded-lg px-3 py-2 text-gray-200 focus:border-blue-500 transition-all" placeholder="https://api.openai.com/v1">
                </div>
                <div>
                    <label class="text-xs text-gray-400 mb-1 block">大模型 API Key</label>
                    <input type="password" v-model="tempConfig.openAIApiKey" class="w-full bg-gray-900 border border-gray-750 rounded-lg px-3 py-2 text-gray-200 focus:border-blue-500 transition-all" placeholder="sk-...">
                </div>
                <div>
                    <label class="text-xs text-gray-400 mb-1 block">系统提示词 (System Prompt)</label>
                    <textarea v-model="tempConfig.systemPrompt" class="w-full bg-gray-900 border border-gray-750 rounded-lg px-3 py-2 text-gray-200 focus:border-blue-500 transition-all h-20" placeholder="你是 MonoAI，一个全能的智能助手..."></textarea>
                </div>
                <div class="pt-2 border-t border-gray-750">
                    <label class="text-xs text-gray-400 mb-1 block">Supabase URL (用于云端存取与流式转发)</label>
                    <input v-model="tempConfig.supabaseUrl" class="w-full bg-gray-900 border border-gray-750 rounded-lg px-3 py-2 text-gray-200 focus:border-blue-500 transition-all">
                </div>
                <div>
                    <label class="text-xs text-gray-400 mb-1 block">Supabase Anon Key</label>
                    <input type="password" v-model="tempConfig.supabaseKey" class="w-full bg-gray-900 border border-gray-750 rounded-lg px-3 py-2 text-gray-200 focus:border-blue-500 transition-all">
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-2">
                <button v-if="isConfigured" @click="showSettings = false" class="px-4 py-2 rounded-lg text-gray-300 hover:bg-gray-750 transition-colors">取消</button>
                <button @click="saveAndInit" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors font-medium">保存并开始</button>
            </div>
        </div>
    </div>

    <div :class="['bg-gray-900 border-r border-gray-800 flex flex-col transition-all duration-300', showSidebar ? 'w-64' : 'w-0 opacity-0']">
        <div class="p-3 flex items-center justify-between">
            <button @click="createNewSession" class="flex-1 flex items-center gap-2 bg-gray-850 hover:bg-gray-750 px-3 py-2 rounded-lg text-gray-200 transition-colors">
                <i class="ph ph-plus text-lg"></i>
                <span class="font-medium">新对话</span>
            </button>
            <button @click="showSidebar = false" class="ml-2 p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-800 lg:hidden">
                <i class="ph ph-x text-lg"></i>
            </button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-2 flex flex-col gap-1">
            <div class="text-xs text-gray-500 font-semibold px-2 py-2">聊天历史</div>
            <div v-for="session in sessions" :key="session.id" 
                 @click="loadSession(session.id)"
                 :class="['group flex items-center justify-between px-3 py-2.5 rounded-lg cursor-pointer transition-colors', currentSessionId === session.id ? 'bg-gray-800 text-white' : 'text-gray-400 hover:bg-gray-850 hover:text-gray-200']">
                <div class="truncate flex-1 flex items-center gap-2">
                    <i class="ph ph-chat-circle"></i>
                    <span class="truncate">{{ session.title || '新会话' }}</span>
                </div>
                <button @click.stop="deleteSession(session.id)" class="opacity-0 group-hover:opacity-100 p-1 text-gray-500 hover:text-red-400 transition-opacity">
                    <i class="ph ph-trash"></i>
                </button>
            </div>
        </div>

        <div class="p-3 border-t border-gray-800">
            <button @click="showSettings = true" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-gray-400 hover:bg-gray-850 hover:text-gray-200 transition-colors">
                <div class="w-7 h-7 bg-gray-750 rounded-full flex items-center justify-center">
                    <i class="ph ph-user text-sm"></i>
                </div>
                <span class="font-medium flex-1 text-left">账户设置</span>
                <i class="ph ph-gear"></i>
            </button>
        </div>
    </div>

    <div class="flex-1 flex flex-col h-full bg-gray-850 relative">
        
        <div class="h-14 flex items-center justify-between px-4 sticky top-0 bg-gray-850/80 backdrop-blur-md z-10">
            <div class="flex items-center gap-3">
                <button @click="showSidebar = !showSidebar" class="p-2 -ml-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-750 transition-colors">
                    <i class="ph ph-list text-xl"></i>
                </button>
                <div class="font-medium text-lg flex items-center gap-2 cursor-pointer hover:bg-gray-800 px-3 py-1.5 rounded-xl transition-colors">
                    {{ appConfig.model || '未选择模型' }}
                    <i class="ph ph-caret-down text-sm text-gray-500"></i>
                </div>
            </div>
        </div>

        <div ref="chatContainer" class="flex-1 overflow-y-auto w-full px-4 scroll-smooth">
            <div class="max-w-3xl mx-auto flex flex-col gap-6 py-6 pb-32">
                
                <div v-if="messages.length === 0" class="flex flex-col items-center justify-center h-[50vh] text-gray-500 gap-4">
                    <div class="w-16 h-16 bg-gray-800 rounded-2xl flex items-center justify-center mb-2">
                        <i class="ph ph-sparkle text-3xl"></i>
                    </div>
                    <h1 class="text-2xl font-semibold text-gray-300">需要帮忙吗？</h1>
                    <p class="text-sm">在下方输入你想探讨的内容</p>
                </div>

                <div v-for="(msg, index) in messages" :key="msg.id" class="message-bubble group flex gap-4 w-full">
                    <div class="w-8 h-8 flex-shrink-0 rounded-full flex items-center justify-center mt-0.5"
                         :class="msg.role === 'user' ? 'bg-gray-750' : 'bg-blue-600/20 text-blue-500 border border-blue-500/20'">
                        <i v-if="msg.role === 'user'" class="ph ph-user text-sm text-gray-300"></i>
                        <i v-else class="ph ph-robot text-sm"></i>
                    </div>
                    
                    <div class="flex-1 min-w-0 flex flex-col relative">
                        <div class="font-semibold text-gray-400 mb-1 flex justify-between items-center">
                            {{ msg.role === 'user' ? '你' : appConfig.model }}
                            
                            <div class="msg-actions opacity-0 flex gap-1 bg-gray-800 rounded-lg p-1 border border-gray-750 shadow-sm transition-opacity">
                                <button @click="copyText(msg.content)" class="p-1.5 rounded hover:bg-gray-700 text-gray-400 hover:text-white" title="复制">
                                    <i class="ph ph-copy text-sm"></i>
                                </button>
                                <button v-if="msg.role === 'user'" @click="openEdit(index)" class="p-1.5 rounded hover:bg-gray-700 text-gray-400 hover:text-white" title="编辑并重新发送">
                                    <i class="ph ph-pencil-simple text-sm"></i>
                                </button>
                                <button v-if="msg.role === 'assistant'" @click="regenerate(index)" class="p-1.5 rounded hover:bg-gray-700 text-gray-400 hover:text-white" title="重新生成">
                                    <i class="ph ph-arrows-clockwise text-sm"></i>
                                </button>
                            </div>
                        </div>

                        <div v-if="editingIndex === index" class="w-full bg-gray-800 rounded-xl p-3 border border-gray-700">
                            <textarea v-model="editContent" class="w-full bg-transparent border-none focus:outline-none text-gray-200 resize-none h-24"></textarea>
                            <div class="flex justify-end gap-2 mt-2">
                                <button @click="editingIndex = -1" class="px-3 py-1.5 rounded-lg text-sm bg-gray-750 hover:bg-gray-700 transition-colors">取消</button>
                                <button @click="saveEdit(index)" class="px-3 py-1.5 rounded-lg text-sm bg-blue-600 hover:bg-blue-700 text-white transition-colors">发送并截断历史</button>
                            </div>
                        </div>

                        <div v-else class="markdown-body text-[15px]" v-html="renderMarkdown(msg.content)"></div>
                    </div>
                </div>

                <div v-if="isLoading && !isStreaming" class="flex gap-4 w-full animate-pulse">
                    <div class="w-8 h-8 flex-shrink-0 rounded-full bg-blue-600/20 border border-blue-500/20 flex items-center justify-center mt-0.5">
                        <i class="ph ph-robot text-sm text-blue-500"></i>
                    </div>
                    <div class="flex flex-col justify-center gap-2 w-full">
                        <div class="h-4 bg-gray-800 rounded w-1/3"></div>
                        <div class="h-4 bg-gray-800 rounded w-1/4"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 right-0 px-4 pb-6 pt-10 bg-gradient-to-t from-gray-850 via-gray-850 to-transparent">
            <div class="max-w-3xl mx-auto relative flex items-end bg-gray-750 rounded-[28px] border border-gray-700 p-2 shadow-xl focus-within:border-gray-500 transition-colors">
                
                <button class="p-3 text-gray-400 hover:text-white rounded-full hover:bg-gray-600 transition-colors mb-0.5">
                    <i class="ph ph-paperclip text-xl"></i>
                </button>
                
                <textarea 
                    ref="inputBox"
                    v-model="input" 
                    @keydown.enter="handleEnter"
                    @input="resizeInput"
                    rows="1"
                    class="flex-1 max-h-48 bg-transparent text-gray-100 px-2 py-3 focus:outline-none resize-none"
                    placeholder="发送消息给 MonoAI... (Shift + Enter 换行)"></textarea>
                
                <button v-if="isLoading" @click="stopGeneration" class="p-3 mb-0.5 ml-2 bg-gray-800 text-white rounded-full hover:bg-gray-700 transition-colors border border-gray-600">
                    <i class="ph ph-stop text-xl"></i>
                </button>
                <button v-else @click="sendMessage" :disabled="!input.trim()" class="p-3 mb-0.5 ml-2 bg-white text-black rounded-full hover:bg-gray-200 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                    <i class="ph ph-arrow-up text-xl font-bold"></i>
                </button>

            </div>
            <div class="text-center text-xs text-gray-500 mt-3">
                MonoAI Pro 可以犯错。请核对重要信息。
            </div>
        </div>

    </div>
</div>

<script>
    const { createApp, ref, reactive, onMounted, nextTick, watch } = Vue;

    createApp({
        setup() {
            // ==== 状态管理 ====
            const isConfigured = ref(false);
            const showSettings = ref(false);
            const showSidebar = ref(window.innerWidth > 1024);
            const isLoading = ref(false);
            const isStreaming = ref(false);
            
            const appConfig = reactive({ supabaseUrl: '', supabaseKey: '', openAIApiKey: '', apiBaseUrl: '', model: '', systemPrompt: '' });
            const tempConfig = reactive({ ...appConfig });
            
            const sessions = ref([]);
            const messages = ref([]);
            const currentSessionId = ref(null);
            
            const input = ref('');
            const chatContainer = ref(null);
            const inputBox = ref(null);

            const editingIndex = ref(-1);
            const editContent = ref('');
            
            let supabase = null;
            let abortController = null;

            // ==== 初始化与配置 ====
            onMounted(() => {
                const saved = localStorage.getItem('monoai_config');
                if (saved) {
                    Object.assign(appConfig, JSON.parse(saved));
                    Object.assign(tempConfig, appConfig);
                    if (appConfig.supabaseUrl && appConfig.supabaseKey) {
                        initSupabase();
                        isConfigured.value = true; // 🐛 修复：之前错误地写成了 .ref
                        loadSessionsList();
                    }
                }
            });

            const saveAndInit = () => {
                Object.assign(appConfig, tempConfig);
                localStorage.setItem('monoai_config', JSON.stringify(appConfig));
                initSupabase();
                isConfigured.value = true;
                showSettings.value = false;
                if(!currentSessionId.value) createNewSession();
            };

            const initSupabase = () => {
                supabase = window.supabase.createClient(appConfig.supabaseUrl, appConfig.supabaseKey);
            };

            // ==== 会话与数据管理 (Supabase 交互) ====
            const loadSessionsList = async () => {
                if(!supabase) return;
                const { data } = await supabase.from('sessions').select('*').order('created_at', { ascending: false });
                if(data) sessions.value = data;
                if(data?.length > 0 && !currentSessionId.value) loadSession(data[0].id);
            };

            const createNewSession = async () => {
                if(!supabase) return;
                const { data } = await supabase.from('sessions').insert([{ title: '新会话' }]).select().single();
                if(data) {
                    sessions.value.unshift(data);
                    currentSessionId.value = data.id;
                    messages.value = [];
                    if(window.innerWidth <= 1024) showSidebar.value = false;
                }
            };

            const loadSession = async (id) => {
                currentSessionId.value = id;
                const { data } = await supabase.from('messages').select('*').eq('session_id', id).order('created_at', { ascending: true });
                messages.value = data || [];
                scrollToBottom();
                if(window.innerWidth <= 1024) showSidebar.value = false;
            };

            const deleteSession = async (id) => {
                if(!supabase) return;
                await supabase.from('sessions').delete().eq('id', id);
                sessions.value = sessions.value.filter(s => s.id !== id);
                if(currentSessionId.value === id) {
                    currentSessionId.value = null;
                    messages.value = [];
                    if(sessions.value.length > 0) loadSession(sessions.value[0].id);
                }
            };

            // ==== 核心对话逻辑 ====
            const handleEnter = (e) => {
                if (e.shiftKey) return;
                e.preventDefault();
                sendMessage();
            };

            const resizeInput = () => {
                const el = inputBox.value;
                el.style.height = 'auto';
                el.style.height = Math.min(el.scrollHeight, 200) + 'px';
            };

            const scrollToBottom = () => {
                nextTick(() => {
                    if (chatContainer.value) {
                        chatContainer.value.scrollTop = chatContainer.value.scrollHeight;
                    }
                });
            };

            // ==== 发送与流式接收 (Edge Function 调用) ====
            const executeGeneration = async (msgContext) => {
                isLoading.value = true;
                isStreaming.value = false;
                abortController = new AbortController();

                // 提取供大模型使用的上下文
                const payloadMessages = [];
                if(appConfig.systemPrompt) {
                    payloadMessages.push({ role: 'system', content: appConfig.systemPrompt });
                }
                msgContext.forEach(m => payloadMessages.push({ role: m.role, content: m.content }));

                // 预创建 Assistant 气泡
                const assistantMsgId = 'temp_' + Date.now();
                messages.value.push({ id: assistantMsgId, session_id: currentSessionId.value, role: 'assistant', content: '' });
                const targetMsg = messages.value[messages.value.length - 1];

                // 🌟 核心优化：智能补全 API 路径
                let finalApiUrl = appConfig.apiBaseUrl;
                if (finalApiUrl && !finalApiUrl.endsWith('/chat/completions')) {
                    // 自动去除用户末尾可能多打的斜杠，并拼上 /chat/completions
                    finalApiUrl = finalApiUrl.replace(/\/$/, '') + '/chat/completions';
                }

                try {
                    // 仅使用原生 fetch 调用 Edge Function，完美支持 SSE 流式接收
                    const response = await fetch(`${appConfig.supabaseUrl}/functions/v1/chat`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${appConfig.supabaseKey}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            messages: payloadMessages, 
                            model: appConfig.model, 
                            baseURL: finalApiUrl, // 👈 传入智能补全后的 URL
                            apiKey: appConfig.openAIApiKey
                        }),
                        signal: abortController.signal
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errText}`);
                    }

                    isStreaming.value = true;
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = ''; 
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        
                        buffer += decoder.decode(value, { stream: true });
                        const parts = buffer.split('\n\n');
                        buffer = parts.pop(); 
                        
                        for (const part of parts) {
                            const lines = part.split('\n');
                            for (const line of lines) {
                                if (line.startsWith('data: ')) {
                                    if (line.trim() === 'data: [DONE]') continue;
                                    try {
                                        const jsonStr = line.substring(6);
                                        const parsed = JSON.parse(jsonStr);
                                        if(parsed.choices && parsed.choices[0].delta && parsed.choices[0].delta.content) {
                                            targetMsg.content += parsed.choices[0].delta.content;
                                            scrollToBottom();
                                        }
                                    } catch(e) {
                                        console.warn("JSON Parse chunk error:", e, line);
                                    }
                                }
                            }
                        }
                    }

                    // 流结束，将最终内容存入数据库
                    if(supabase && targetMsg.content) {
                        await supabase.from('messages').insert([
                            { session_id: currentSessionId.value, role: 'assistant', content: targetMsg.content }
                        ]);
                    }

                } catch (err) {
                    if (err.name !== 'AbortError') {
                        targetMsg.content = `**生成出错**: ${err.message}`;
                        console.error("Chat Error:", err);
                    }
                } finally {
                    isLoading.value = false;
                    isStreaming.value = false;
                }
            };


            const sendMessage = async () => {
                if (!input.value.trim() || isLoading.value) return;
                
                if (!currentSessionId.value) await createNewSession();
                
                const userContent = input.value.trim();
                input.value = '';
                resizeInput();

                // 存入前端和数据库
                const userMsg = { id: window.crypto.randomUUID(), session_id: currentSessionId.value, role: 'user', content: userContent };
                messages.value.push(userMsg);
                scrollToBottom();

                if (supabase) await supabase.from('messages').insert([userMsg]);

                // 如果是第一条消息，生成标题
                if (messages.value.length === 1 && supabase) {
                    supabase.from('sessions').update({ title: userContent.slice(0, 15) }).eq('id', currentSessionId.value).then(()=>loadSessionsList());
                }

                await executeGeneration(messages.value);
            };

            const stopGeneration = () => {
                if(abortController) abortController.abort();
            };

            // ==== Chatbox 特色功能：时空管理 (编辑/重新生成) ====
            const openEdit = (index) => {
                editingIndex.value = index;
                editContent.value = messages.value[index].content;
            };

            const saveEdit = async (index) => {
                if(!editContent.value.trim()) return;
                
                // 1. 截断后续消息分支
                const msgToUpdate = messages.value[index];
                msgToUpdate.content = editContent.value;
                const msgsToDelete = messages.value.slice(index + 1);
                
                // 2. 更新视图状态
                messages.value = messages.value.slice(0, index + 1);
                editingIndex.value = -1;

                // 3. 数据库同步处理
                if(supabase) {
                    await supabase.from('messages').update({ content: editContent.value }).eq('id', msgToUpdate.id);
                    if(msgsToDelete.length > 0) {
                        const ids = msgsToDelete.map(m => m.id);
                        await supabase.from('messages').delete().in('id', ids);
                    }
                }

                // 4. 重建触发生成
                await executeGeneration(messages.value);
            };

            const regenerate = async (index) => {
                // 如果对 AI 回复点击重新生成，则丢弃该回复及以后的所有内容，重新根据前文生成
                const msgsToDelete = messages.value.slice(index);
                messages.value = messages.value.slice(0, index);
                
                if(supabase && msgsToDelete.length > 0) {
                    const ids = msgsToDelete.map(m => m.id);
                    await supabase.from('messages').delete().in('id', ids);
                }

                await executeGeneration(messages.value);
            };

            // ==== UI 工具函数 ====
            const renderMarkdown = (text) => {
                if(!text) return '';
                const html = marked.parse(text);
                nextTick(() => {
                    document.querySelectorAll('pre code').forEach((el) => hljs.highlightElement(el));
                    document.querySelectorAll('pre').forEach(pre => {
                        if (!pre.querySelector('.copy-btn')) {
                            const btn = document.createElement('button');
                            btn.className = 'copy-btn absolute top-2 right-2 p-1.5 rounded-lg bg-gray-700 text-gray-300 hover:text-white hover:bg-gray-600 transition-colors';
                            btn.innerHTML = '<i class="ph ph-copy"></i>';
                            btn.onclick = () => { navigator.clipboard.writeText(pre.querySelector('code').innerText); };
                            pre.appendChild(btn);
                        }
                    });
                });
                return html;
            };

            const copyText = (text) => {
                navigator.clipboard.writeText(text);
            };

            return {
                appConfig, tempConfig, isConfigured, sessions, messages, currentSessionId, input, isLoading, isStreaming, showSidebar, showSettings, editingIndex, editContent, chatContainer, inputBox,
                saveAndInit, createNewSession, loadSession, deleteSession, sendMessage, handleEnter, resizeInput, renderMarkdown, copyText, regenerate, openEdit, saveEdit, stopGeneration
            };
        }
    }).mount('#app');
</script>
